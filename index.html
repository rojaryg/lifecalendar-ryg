<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Life Calendar ✦</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ── FLOWTASK DESIGN SYSTEM (SYNCED DENGAN HUB) ── */
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --card: #1c1c1c;
            --border: #272727;
            --border-light: #333333;
            --text: #efefef;
            --text-muted: #555555;
            --text-mid: #999999;
            --accent: #efefef;
            --accent-glow: rgba(239,239,239,0.10);
            --flow: #ffffff;
            --flow-glow: rgba(255,255,255,0.15);
            --flow-dim: rgba(255,255,255,0.07);
            --success: #4caf82;
            --danger: #e05252;
            --radius: 14px;
            --radius-sm: 9px;
            --lived: #333333;
        }

        body[data-theme="light"] {
            --bg: #e2e0dc;
            --surface: #eceae6;
            --card: #ffffff;
            --border: #d0ceca;
            --border-light: #c0beba;
            --text: #141414;
            --text-muted: #9a9892;
            --text-mid: #4a4845;
            --accent: #141414;
            --accent-glow: rgba(20,20,20,0.08);
            --flow: #141414;
            --flow-glow: rgba(20,20,20,0.18);
            --flow-dim: rgba(0,0,0,0.07);
            --success: #2f8b66;
            --danger: #c94040;
            --lived: #c0beba;
        }

        body[data-theme="miku"] {
            --bg: #FFF0F7;
            --surface: #f2fcfb;
            --card: #ffffff;
            --border: #99D5D0;
            --border-light: #BCE8E4;
            --text: #1A2B2A;
            --text-muted: #007871;
            --text-mid: #005D57;
            --accent: #E3007F;
            --accent-glow: rgba(227,0,127,0.14);
            --flow: #00C4B6;
            --flow-glow: rgba(0,196,182,0.30);
            --flow-dim: rgba(0,196,182,0.15);
            --success: #00a898;
            --danger: #d04b4b;
            --lived: #BCE8E4;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            gap: 24px;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .logo h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }
        
        .logo h1 span { font-weight: 300; }
        .logo p { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }

        .section-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: block;
            font-weight: 500;
        }

        .control-group { margin-bottom: 20px; }

        input, select {
            width: 100%;
            padding: 10px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s, background 0.3s ease;
        }
        input:focus { border-color: var(--accent); }

        .filter-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .filter-item:hover { background: var(--card); }
        .filter-item input { width: auto; }

        .sidebar-footer { margin-top: auto; display: flex; flex-direction: column; gap: 12px; }

        /* --- MAIN CONTENT --- */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            overflow: hidden;
            transition: background 0.3s ease;
        }

        .main-header {
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            transition: border-color 0.3s ease;
        }
        
        .main-header h2 { 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 1.8rem; 
            font-weight: 500; 
            letter-spacing: -0.02em;
        }

        .calendar-container {
            flex: 1;
            padding: 40px;
            overflow: auto;
            display: flex;
            justify-content: center;
        }

        .grid-scroll-wrapper { position: relative; }

        .grid {
            display: grid;
            grid-template-columns: 40px repeat(52, 13px);
            gap: 4px;
        }

        .axis-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.65rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .y-label { justify-content: flex-end; padding-right: 8px; }

        .week-box {
            width: 13px;
            height: 13px;
            border: 1px solid var(--border);
            border-radius: 2px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: crosshair;
        }
        .week-box:hover {
            transform: scale(1.5);
            z-index: 10;
            border-color: var(--text);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        .week-box.lived { background-color: var(--lived); border-color: var(--lived); }
        .week-box.current { border: 2px solid var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

        .marker {
            width: 5px;
            height: 5px;
            background: var(--bg);
            border-radius: 50%;
            margin: 3px auto;
        }

        /* --- BOTTOM PANEL --- */
        #bottom-panel {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 24px 40px;
            display: flex;
            gap: 40px;
            height: 240px;
            box-sizing: border-box;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .bottom-column {
            display: flex;
            flex-direction: column;
        }
        
        .bottom-column.form-side {
            width: 380px;
            flex-shrink: 0;
        }

        .bottom-column.list-side {
            flex: 1;
        }

        .bottom-divider {
            width: 1px;
            background: var(--border);
            align-self: stretch;
            transition: background 0.3s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, background 0.3s ease, color 0.3s ease;
        }
        .btn-primary:active { transform: scale(0.98); }
        
        .btn-secondary {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            font-size: 0.85rem;
            width: 100%;
            transition: background 0.2s, border-color 0.2s, color 0.3s ease;
        }
        .btn-secondary:hover {
            border-color: var(--border-light);
        }

        .data-item {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .data-item .actions { display: flex; gap: 8px; }
        .data-item button { background: none; border: none; color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
        .data-item button:hover { color: var(--text); }

        #dataList {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* --- THEME PICKER --- */
        .theme-picker {
            display: flex;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 4px;
            gap: 4px;
        }
        .tpick {
            flex: 1;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            padding: 6px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }
        .tpick:hover { color: var(--text); }
        .tpick.active { 
            background: var(--flow-dim); 
            border-color: var(--flow);
            color: var(--text); 
        }

        /* --- TOOLTIP --- */
        #tooltip {
            position: fixed;
            background: var(--surface);
            border: 1px solid var(--border-light);
            color: var(--text);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            pointer-events: none;
            opacity: 0;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: opacity 0.2s;
        }
    </style>
</head>
<body data-theme="dark">

<aside id="sidebar">
    <div class="logo">
        <h1>Life<span>Calendar</span> ✦</h1>
        <p>A Visual 90-Year Journey</p>
    </div>

    <div class="control-group">
        <label class="section-label">Identity</label>
        <input type="date" id="dobInput">
    </div>

    <div class="control-group">
        <label class="section-label">Tampilan / Filters</label>
        <div id="filterList" class="filter-list"></div>
    </div>

    <div class="sidebar-footer">
        <button class="btn-secondary" onclick="toggleFullscreen()">Toggle Fullscreen</button>
        <div class="theme-picker">
            <button class="tpick active" data-theme="dark" onclick="setTheme('dark')">Dark</button>
            <button class="tpick" data-theme="light" onclick="setTheme('light')">Light</button>
            <button class="tpick" data-theme="miku" onclick="setTheme('miku')">Miku</button>
        </div>
    </div>
</aside>

<main id="main">
    <header class="main-header">
        <h2 id="header-weeks">4,680 Weeks</h2>
        <div id="header-stats" style="font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; color: var(--text-muted);">
            Lived: <span id="stat-lived" style="color: var(--text); font-weight: 500;">0</span> | Remaining: <span id="stat-rem">0</span>
        </div>
    </header>

    <div class="calendar-container">
        <div class="grid-scroll-wrapper">
            <div class="grid" id="calendarGrid"></div>
        </div>
    </div>

    <div id="bottom-panel">
        <div class="bottom-column form-side">
            <label class="section-label" id="form-title">Tambah Fase Kehidupan</label>
            <div class="control-group" style="margin-bottom: 0;">
                <input type="text" id="phaseName" placeholder="Contoh: Masa Kecil, Karir...">
                <div style="display: grid; grid-template-columns: 1fr 1fr 60px; gap: 10px; margin-top: 10px;">
                    <input type="number" id="phaseStart" placeholder="Umur Mulai">
                    <input type="number" id="phaseEnd" placeholder="Umur Selesai">
                    <input type="color" id="phaseColor" value="#efefef" style="height: 38px; padding: 2px;">
                </div>
                <div style="display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-top: 10px;">
                    <button class="btn-primary" id="btnSubmitPhase" onclick="submitPhase()">Simpan Fase</button>
                    <button id="btnCancelEdit" class="btn-secondary" style="display: none;" onclick="cancelEdit()">Batal</button>
                </div>
            </div>
        </div>

        <div class="bottom-divider"></div>

        <div class="bottom-column list-side">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <label class="section-label" style="margin-bottom: 0;">Events & Phases Tersimpan</label>
                <button class="btn-secondary" style="width: auto; padding: 4px 12px; font-size: 0.75rem;" onclick="addEventMode()">+ Tambah Event Spesifik</button>
            </div>
            <div id="dataList"></div>
        </div>
    </div>
</main>

<div id="tooltip"></div>

<script>
    // --- STATE ---
    const defaultData = {
        dob: '2006-06-07',
        items: [
            { id: 1, type: 'phase', name: 'Masa Sekolah', start: 6, end: 18, color: '#7c5cfc' },
            { id: 2, type: 'event', name: 'Lahir', age: 0, week: 1, color: '#ffffff' }
        ]
    };

    let appData = JSON.parse(localStorage.getItem('myLifeCalendar_v2')) || defaultData;
    let hiddenIds = new Set();
    let editId = null;
    let currentMode = 'phase'; // 'phase' or 'event'

    // --- INIT ---
    function init() {
        document.getElementById('dobInput').value = appData.dob;
        document.getElementById('dobInput').onchange = (e) => {
            appData.dob = e.target.value;
            save();
            render();
        };
        setTheme(appData.theme || 'dark');
        render();
    }

    // --- CORE LOGIC ---
    function getStats() {
        const dob = new Date(appData.dob);
        const diff = new Date() - dob;
        const lived = Math.floor(diff / (1000 * 60 * 60 * 24 * 7));
        return { lived, total: 90 * 52, rem: (90 * 52) - lived };
    }

    function render() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const stats = getStats();
        
        document.getElementById('stat-lived').innerText = stats.lived.toLocaleString();
        document.getElementById('stat-rem').innerText = stats.rem.toLocaleString();

        // X-Axis Labels
        grid.appendChild(createDiv('axis-label', ''));
        for (let w = 1; w <= 52; w++) {
            grid.appendChild(createDiv('axis-label', w % 5 === 0 || w === 1 ? w : ''));
        }

        let currentTotalWeek = 1;
        for (let y = 0; y < 90; y++) {
            grid.appendChild(createDiv('axis-label y-label', y % 10 === 0 ? y : ''));

            for (let w = 1; w <= 52; w++) {
                const box = document.createElement('div');
                box.className = 'week-box';
                
                const isLived = currentTotalWeek <= stats.lived;
                const isCurrent = currentTotalWeek === stats.lived;

                if (isLived) box.classList.add('lived');
                if (isCurrent) box.classList.add('current');

                // Check for Items (Phases / Events)
                let bgColor = '';
                let tooltipContent = `Umur ${y}, Minggu ${w}`;

                const activePhase = appData.items.find(i => 
                    i.type === 'phase' && y >= i.start && y <= i.end && !hiddenIds.has(i.id)
                );
                if (activePhase) {
                    bgColor = activePhase.color;
                    tooltipContent += `<br><span style="color:${bgColor}">✦ ${activePhase.name}</span>`;
                }

                const activeEvent = appData.items.find(i => 
                    i.type === 'event' && i.age == y && i.week == w && !hiddenIds.has(i.id)
                );
                if (activeEvent) {
                    box.innerHTML = '<div class="marker"></div>';
                    tooltipContent += `<br>📍 <b>${activeEvent.name}</b>`;
                }

                if (bgColor) box.style.backgroundColor = bgColor;

                box.onmouseenter = (e) => showTooltip(e, tooltipContent);
                box.onmouseleave = hideTooltip;

                grid.appendChild(box);
                currentTotalWeek++;
            }
        }
        renderDataList();
        renderFilters();
    }

    function createDiv(cls, txt) {
        const d = document.createElement('div');
        d.className = cls;
        d.innerText = txt;
        return d;
    }

    // --- UI INTERACTIONS ---
    function showTooltip(e, content) {
        const tip = document.getElementById('tooltip');
        tip.innerHTML = content;
        tip.style.opacity = '1';
        updateTooltipPos(e);
    }

    function updateTooltipPos(e) {
        const tip = document.getElementById('tooltip');
        let x = e.clientX + 15;
        let y = e.clientY - 40;

        if (x + tip.offsetWidth > window.innerWidth) x = e.clientX - tip.offsetWidth - 15;
        tip.style.left = x + 'px';
        tip.style.top = y + 'px';
    }

    function setTheme(t) {
        document.body.setAttribute('data-theme', t);
        appData.theme = t;
        save();
        document.querySelectorAll('.tpick').forEach(b => {
            b.classList.toggle('active', b.getAttribute('data-theme') === t);
        });
    }

    function addEventMode() {
        currentMode = 'event';
        document.getElementById('form-title').innerText = "Tambah Event Spesifik";
        document.getElementById('phaseStart').placeholder = "Umur";
        document.getElementById('phaseEnd').placeholder = "Minggu ke-";
        document.getElementById('btnSubmitPhase').innerText = "Simpan Event";
    }

    function cancelEdit() {
        editId = null;
        currentMode = 'phase';
        document.getElementById('form-title').innerText = "Tambah Fase Kehidupan";
        document.getElementById('phaseName').value = '';
        document.getElementById('phaseStart').value = '';
        document.getElementById('phaseEnd').value = '';
        document.getElementById('btnSubmitPhase').innerText = "Simpan Fase";
        document.getElementById('btnCancelEdit').style.display = 'none';
    }

    function submitPhase() {
        const name = document.getElementById('phaseName').value;
        const val1 = parseInt(document.getElementById('phaseStart').value);
        const val2 = parseInt(document.getElementById('phaseEnd').value);
        const color = document.getElementById('phaseColor').value;

        if (!name || isNaN(val1)) return;

        const newItem = {
            id: editId || Date.now(),
            type: currentMode,
            name,
            color
        };

        if (currentMode === 'phase') {
            newItem.start = val1;
            newItem.end = val2;
        } else {
            newItem.age = val1;
            newItem.week = val2;
        }

        if (editId) {
            const idx = appData.items.findIndex(i => i.id === editId);
            appData.items[idx] = newItem;
        } else {
            appData.items.push(newItem);
        }

        save();
        cancelEdit();
        render();
    }

    function editItem(id) {
        const item = appData.items.find(i => i.id === id);
        editId = id;
        currentMode = item.type;
        
        document.getElementById('phaseName').value = item.name;
        document.getElementById('phaseColor').value = item.color;
        document.getElementById('btnCancelEdit').style.display = 'block';

        if (item.type === 'phase') {
            addPhaseMode(); 
            document.getElementById('phaseStart').value = item.start;
            document.getElementById('phaseEnd').value = item.end;
        } else {
            addEventMode();
            document.getElementById('phaseStart').value = item.age;
            document.getElementById('phaseEnd').value = item.week;
        }
        document.getElementById('btnSubmitPhase').innerText = "Update Data";
    }

    function addPhaseMode() {
        currentMode = 'phase';
        document.getElementById('form-title').innerText = "Tambah Fase Kehidupan";
        document.getElementById('phaseStart').placeholder = "Umur Mulai";
        document.getElementById('phaseEnd').placeholder = "Umur Selesai";
    }

    function deleteItem(id) {
        appData.items = appData.items.filter(i => i.id !== id);
        save();
        render();
    }

    function toggleFilter(id) {
        if (hiddenIds.has(id)) hiddenIds.delete(id);
        else hiddenIds.add(id);
        render();
    }

    function renderDataList() {
        const list = document.getElementById('dataList');
        list.innerHTML = '';
        appData.items.forEach(item => {
            const el = document.createElement('div');
            el.className = 'data-item';
            el.innerHTML = `
                <span><i style="color:${item.color}">●</i> ${item.name}</span>
                <div class="actions">
                    <button onclick="editItem(${item.id})">✎</button>
                    <button onclick="deleteItem(${item.id})">✕</button>
                </div>
            `;
            list.appendChild(el);
        });
    }

    function renderFilters() {
        const list = document.getElementById('filterList');
        list.innerHTML = '';
        appData.items.forEach(item => {
            const label = document.createElement('label');
            label.className = 'filter-item';
            const checked = hiddenIds.has(item.id) ? '' : 'checked';
            label.innerHTML = `
                <input type="checkbox" ${checked} onchange="toggleFilter(${item.id})">
                <span>${item.name}</span>
            `;
            list.appendChild(label);
        });
    }

    function hideTooltip() { document.getElementById('tooltip').style.opacity = '0'; }
    function save() { localStorage.setItem('myLifeCalendar_v2', JSON.stringify(appData)); }
    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    init();
</script>

</body>
</html>
